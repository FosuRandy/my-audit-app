{% extends "base.html" %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1 class="h3 mb-3">Edit User</h1>
            
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-control" id="role" name="role" required>
                                <option value="director" {{ 'selected' if user.role == 'director' else '' }}>Director</option>
                                <option value="head_of_business_control" {{ 'selected' if user.role == 'head_of_business_control' else '' }}>Head of Business Control</option>
                                <option value="auditor" {{ 'selected' if user.role == 'auditor' else '' }}>Auditor</option>
                                <option value="auditee" {{ 'selected' if user.role == 'auditee' else '' }}>Auditee</option>
                            </select>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Update User</button>
                            <a href="/users" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
